<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D20 Dice Roller</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, rgba(30, 30, 40, 0.95) 0%, rgba(10, 10, 15, 0.98) 100%);
        z-index: 9999;
      }
      
      .dice-icon {
        width: 80px;
        height: 80px;
        position: relative;
        animation: float 2s ease-in-out infinite, spin 4s linear infinite;
      }
      
      .dice-icon svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 20px rgba(139, 69, 19, 0.6));
      }
      
      .loading-text {
        margin-top: 24px;
        color: #d4a574;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      .loading-dots {
        display: inline-block;
        width: 24px;
        text-align: left;
      }
      
      .loading-dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      
      @keyframes spin {
        0% { transform: rotateY(0deg) rotateX(10deg); }
        100% { transform: rotateY(360deg) rotateX(10deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
        100% { content: ''; }
      }
      
      .subtitle {
        margin-top: 8px;
        color: rgba(212, 165, 116, 0.5);
        font-size: 12px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="dice-icon">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- D20 Icosahedron shape -->
          <defs>
            <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#8B4513"/>
              <stop offset="50%" style="stop-color:#A0522D"/>
              <stop offset="100%" style="stop-color:#6B3510"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <!-- Main dice body -->
          <polygon points="50,5 90,30 90,70 50,95 10,70 10,30" fill="url(#woodGrad)" stroke="#5a3010" stroke-width="2" filter="url(#glow)"/>
          <!-- Face lines -->
          <line x1="50" y1="5" x2="50" y2="50" stroke="#5a3010" stroke-width="1.5" opacity="0.7"/>
          <line x1="10" y1="30" x2="50" y2="50" stroke="#5a3010" stroke-width="1.5" opacity="0.7"/>
          <line x1="90" y1="30" x2="50" y2="50" stroke="#5a3010" stroke-width="1.5" opacity="0.7"/>
          <line x1="10" y1="70" x2="50" y2="50" stroke="#5a3010" stroke-width="1.5" opacity="0.7"/>
          <line x1="90" y1="70" x2="50" y2="50" stroke="#5a3010" stroke-width="1.5" opacity="0.7"/>
          <line x1="50" y1="95" x2="50" y2="50" stroke="#5a3010" stroke-width="1.5" opacity="0.7"/>
          <!-- Number 20 -->
          <text x="50" y="58" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold" font-family="serif">20</text>
        </svg>
      </div>
      <div class="loading-text">Loading<span class="loading-dots"></span></div>
      <div class="subtitle">D20 Dice Roller</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
    <script>
      // Hide loading screen when React app is ready
      window.addEventListener('DOMContentLoaded', () => {
        const checkReady = setInterval(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
              loadingScreen.style.transition = 'opacity 0.5s ease-out';
              loadingScreen.style.opacity = '0';
              setTimeout(() => {
                loadingScreen.remove();
              }, 500);
            }
            clearInterval(checkReady);
          }
        }, 100);
      });
    </script>
  </body>
</html>
